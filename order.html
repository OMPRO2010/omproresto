<!DOCTYPE html>
<html>
<head>
  <title>Order Online</title>
  <style>
    body {font-family: Arial; padding: 20px;}
    .item {border:1px solid #ddd; padding:15px; margin:10px; width:250px; display:inline-block;}
    button {background:#ff4d4d; color:white; padding:10px; border:none; cursor:pointer;}
  </style>
</head>
<body>

<h1>🍽️ Order Online</h1>

<div class="item">
  <h3>Paneer Butter Masala</h3>
  <p>₹250</p>
  <button onclick="addToCart('Paneer Butter Masala',250)">Add to Cart</button>
</div>

<div class="item">
  <h3>Veg Biryani</h3>
  <p>₹220</p>
  <button onclick="addToCart('Veg Biryani',220)">Add to Cart</button>
</div>

<div class="item">
  <h3>Butter Naan</h3>
  <p>₹40</p>
  <button onclick="addToCart('Butter Naan',40)">Add to Cart</button>
</div>
<div class="item">
  <h3>Chocolate Ice Cream</h3>
  <p>₹50</p>
  <button onclick="addToCart('Chocolate Ice Cream 50)">Add to Cart</button>
</div>
<br><br>
<a href="cart.html">🛒 View Cart</a>

<script>
function addToCart(name, price) {
  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  cart.push({name, price});
  localStorage.setItem("cart", JSON.stringify(cart));
  alert(name + " added to cart!");
}
</script>

</body>
</html>
