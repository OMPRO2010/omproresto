<!DOCTYPE html>
<html>
<head>
  <title>Book a Table</title>
  <style>
    body { font-family: Arial; padding: 30px; text-align:center; }
    input, select { padding:10px; width:250px; margin:10px; }
    button { padding:12px 20px; background:#ff4d4d; color:white; border:none; }
  </style>
</head>
<body>

<h1>📅 Book a Table</h1>

<input id="name" placeholder="Your Name"><br>
<input id="phone" placeholder="Phone Number"><br>

<input type="date" id="date"><br>

<select id="time">
  <option>12:00 PM</option>
  <option>1:00 PM</option>
  <option>2:00 PM</option>
  <option>7:00 PM</option>
  <option>8:00 PM</option>
  <option>9:00 PM</option>
</select><br>

<select id="guests">
  <option>1 Guest</option>
  <option>2 Guests</option>
  <option>3 Guests</option>
  <option>4 Guests</option>
  <option>5 Guests</option>
  <option>6+ Guests</option>
</select><br>

<button onclick="bookTable()">Reserve Table</button>

<script>
function bookTable() {

  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;
  let date = document.getElementById("date").value;
  let time = document.getElementById("time").value;
  let guests = document.getElementById("guests").value;

  let message =
  "🍽️ TABLE RESERVATION%0A%0A" +
  "Name: " + name + "%0A" +
  "Phone: " + phone + "%0A" +
  "Date: " + date + "%0A" +
  "Time: " + time + "%0A" +
  "Guests: " + guests;

  // 👉 Replace with your WhatsApp number
  let whatsappNumber = "91XXXXXXXXXX";

  let url = "https://wa.me/" + whatsappNumber + "?text=" + message;
  window.open(url, "_blank");
}
</script>

</body>
</html>
